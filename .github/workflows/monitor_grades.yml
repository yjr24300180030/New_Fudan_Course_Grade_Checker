name: Fudan Grades Monitor

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  monitor-grades:
    runs-on: ${{ vars.ACTIONS_RUNNER_LABEL || 'ubuntu-latest' }}
    env:
      GIT_CONFIG_COUNT: 2
      GIT_CONFIG_KEY_0: http.proxy
      GIT_CONFIG_VALUE_0: ""
      GIT_CONFIG_KEY_1: https.proxy
      GIT_CONFIG_VALUE_1: ""

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pycryptodome cryptography

    - name: Run grade crawler
      env:
        StuId: ${{ secrets.STUDENT_ID }}
        UISPsw: ${{ secrets.UIS_PASSWORD }}
        QQ_SMTP: ${{ secrets.QQ_SMTP_AUTH_CODE }}
        QQ_EMAIL_SENDER: ${{ secrets.QQ_EMAIL_SENDER }}
        # Optional: internal major id, enables 专业排名 (major ranking).
        MAJOR_ASSOC: ${{ secrets.MAJOR_ASSOC }}
        # Default: access fdjwgl through WebVPN (GitHub runners are off-campus).
        # The crawler only rewrites grades_encrypted.json when data changes.
      run: python crawl_grades.py

    - name: Commit and push changes (only if grades changed)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add grades_encrypted.json
        if git diff --cached --quiet; then
          echo "No change in grades_encrypted.json — skipping commit/push."
          echo "Leaving the repo quiet lets GitHub auto-disable the schedule"
          echo "after the grade season ends, saving Actions minutes."
          exit 0
        fi
        git commit -m "Update encrypted grades"
        git pull --rebase
        git push
